<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catheleen Cake Shop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header with Logo -->
    <div class="header">
        <img src="logo.png" class="logo">
        <div class="title">Catheleen Cake Shop</div>
    </div>

    <!-- Banner Image -->
    <div class="banner"></div>

    <!-- Customer Details -->
    <div class="customer">
        <input type="text" id="name" placeholder="Customer Name" required>
        <input type="text" id="address" placeholder="Address" required>
        <input type="datetime-local" id="delivery" required>
        <input type="text" id="altmobile" placeholder="Alternative Mobile Number" required>
    </div>

    <!-- Cakes will load here -->
    <div id="products" class="products"></div>

    <!-- Total Section -->
    <h2 style="text-align:center;">Total: ₹ <span id="total">0</span></h2>

    <!-- Payment -->
    <div style="text-align:center;">
        <h3>Payment Method</h3>
        <label><input type="radio" name="pay" value="Cash"> Cash</label>
        <label><input type="radio" name="pay" value="UPI"> UPI</label>
        <br><br>
        <button onclick="placeOrder()">Place Order on WhatsApp</button>
    </div>

    <!-- Script -->
    <script defer src="script.js"></script>

</body>
</html>
